<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Profissional</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="notificacao" class="hidden">⚠️ Por favor, preencha todos os campos!</div>
    <div class="container">
        <h2>Cadastro de Usuário</h2>
        
        <form id="meuFormulario">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label for="idade">Idade</label>
                <input type="number" id="idade" placeholder="Ex: 25" required>
            </div>

            <div class="input-group">
                <label for="rg">RG (11 dígitos)</label>
                <input type="text" id="rg" placeholder="00000000000" **required** 
                       maxlength="11" oninput="validarNumeros(this)" required>
            </div>

            <div class="input-group">
                <label for="cpf">CPF (11 dígitos)</label>
                <input type="text" id="cpf" placeholder="00000000000" **required** 
                       maxlength="11" oninput="validarNumeros(this)" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="email@exemplo.com" required>
            </div>

            <div class="botoes">
                <button type="button" onclick="cadastrar()" class="btn-cadastrar">Cadastrar</button>
                <button type="button" onclick="alterar()" class="btn-alterar">Alterar</button>
                <button type="reset" class="btn-limpar">Limpar</button>
            </div>
        </form>
    </div>

    <script src="button.Js"></script>
</body>
</html>
